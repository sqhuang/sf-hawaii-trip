<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旧金山 + 夏威夷 9日行程</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #f5f5f0;
      color: #333;
      line-height: 1.6;
    }

    /* ===== Hero Header ===== */
    #trip-header {
      position: relative;
      background: url('images/d3-golden-gate.jpg') center 30%/cover no-repeat;
      color: #fff;
      text-align: center;
      padding: 54px 16px 72px;
      overflow: visible;
    }

    #trip-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(8,8,20,0.35) 0%,
        rgba(12,20,40,0.5) 40%,
        rgba(10,10,22,0.92) 100%);
      z-index: 0;
    }

    #trip-header::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(10,10,22,0.92);
      z-index: 0;
    }

    #trip-header > * {
      position: relative;
      z-index: 1;
    }

    #trip-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #trip-header .date-range {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-bottom: 8px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    #trip-header .badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    #trip-header .badge {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      color: #fff;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    /* ===== Trip Progress Bar ===== */
    .trip-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-top: 4px;
    }
    .trip-progress .prog-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 4px 0;
      min-width: 38px;
      transition: transform 0.15s;
    }
    .trip-progress .prog-day:hover { transform: scale(1.12); }
    .trip-progress .prog-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 2px solid rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .trip-progress .prog-day.active .prog-dot {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
    }
    .trip-progress .prog-day.past .prog-dot {
      background: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.7);
    }
    .trip-progress .prog-label {
      font-size: 0.65rem;
      margin-top: 3px;
      opacity: 0.7;
    }
    .trip-progress .prog-day.active .prog-label {
      opacity: 1;
      font-weight: 700;
    }
    .trip-progress .prog-line {
      width: 20px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .trip-progress .prog-line.past {
      background: rgba(255,255,255,0.7);
    }

    /* ===== App Layout ===== */
    #app {
      display: flex;
      height: calc(100vh - 190px);
      position: relative;
      z-index: 2;
      border-radius: 24px 24px 0 0;
      overflow: hidden;
      background: #f5f5f0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
    }

    #map-panel {
      width: 40%;
      position: relative;
      flex-shrink: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .overview-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #fff;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      transition: background 0.2s;
    }

    .overview-btn:hover {
      background: #f0f0f0;
    }

    #itinerary-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    /* ===== Mobile Layout ===== */
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
        height: auto;
      }

      #map-panel {
        width: 100%;
        height: 45vh;
      }

      #itinerary-panel {
        padding: 16px;
      }
    }

    /* ===== Summary Tables ===== */
    .summary-section {
      margin-bottom: 24px;
    }

    .summary-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .summary-table thead th {
      background: #f0f0ec;
      text-align: left;
      padding: 8px 10px;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #ddd;
    }

    .summary-table tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    .summary-table tbody tr:hover {
      background: #fafaf6;
    }

    /* ===== Checklist ===== */
    .checklist {
      list-style: none;
      padding: 0;
    }

    .checklist li {
      padding: 4px 0;
      font-size: 0.88rem;
      line-height: 1.5;
      border-bottom: 1px solid #f0f0ec;
      transition: opacity 0.3s;
    }
    .checklist li label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
    }
    .checklist li label input[type="checkbox"] {
      margin-top: 4px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      accent-color: #4caf50;
      cursor: pointer;
    }
    .checklist li.done span {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* ===== Day Cards ===== */
    #day-cards {
      margin-top: 8px;
    }

    .day-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
      margin-bottom: 12px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .day-card:hover {
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.12);
    }

    .day-card-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .day-num {
      font-size: 1.3rem;
      font-weight: 800;
      min-width: 40px;
    }

    .day-info {
      flex: 1;
    }

    .day-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #222;
    }

    .day-date {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    .expand-icon {
      font-size: 0.75rem;
      color: #999;
      transition: transform 0.3s ease;
    }

    .day-card.open .expand-icon {
      transform: rotate(180deg);
    }

    /* ===== Day Card Badges ===== */
    .day-card-badges {
      padding: 0 16px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .day-card-badges:empty {
      display: none;
    }

    .tag-flight {
      background: #e3f2fd;
      color: #1565c0;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag-hotel {
      background: #fff3e0;
      color: #e65100;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tag-car {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* ===== Day Card Body (collapsible) ===== */
    .day-card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .day-card.open .day-card-body {
      max-height: 2000px;
    }

    /* ===== Timeline ===== */
    .timeline {
      padding: 4px 16px 16px 36px;
      position: relative;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 8px;
      bottom: 16px;
      width: 2px;
      background: #e0e0e0;
    }

    .timeline-item {
      position: relative;
      padding: 6px 0 6px 20px;
      font-size: 0.85rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -19px;
      top: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px #ccc;
    }

    .timeline-item.has-location::before {
      background: var(--dot-color, #4a90d9);
      box-shadow: 0 0 0 1px var(--dot-color, #4a90d9);
    }

    .timeline-item.has-location {
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .timeline-item.has-location:hover {
      background: #f0f7ff;
    }

    .tl-time {
      color: #666;
      font-weight: 600;
      min-width: 90px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tl-name {
      color: #333;
    }

    /* ===== Scrollbar ===== */
    #itinerary-panel::-webkit-scrollbar {
      width: 6px;
    }

    #itinerary-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #itinerary-panel::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    /* ===== Map Markers ===== */
    .city-marker { background: transparent; border: none; }
    .route-num-marker { background: transparent; border: none; }

    .activity-num-marker { background: transparent; border: none; }
    .activity-num-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      border: 2.5px solid currentColor;
    }
    .tl-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      margin-right: 6px;
      flex-shrink: 0;
    }

    .tl-subs {
      margin: 4px 0 2px 24px;
      padding: 0;
      list-style: none;
      font-size: 11px;
      color: #888;
    }
    .tl-subs li {
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tl-subs li::before {
      content: '•';
      color: #bbb;
    }
    .tl-sub-dur {
      font-size: 10px;
      color: #aaa;
      margin-left: auto;
      white-space: nowrap;
    }
    [data-theme="dark"] .tl-subs { color: #aaa; }
    [data-theme="dark"] .tl-subs li::before { color: #666; }
    [data-theme="dark"] .tl-sub-dur { color: #777; }

    .day-card.active { box-shadow: 0 0 0 2px #1976d2, 0 2px 8px rgba(25,118,210,0.2); }

    @media print {
      #map-panel { display: none; }
      #itinerary-panel { width: 100%; overflow: visible; }
      .day-card { break-inside: avoid; }
      .day-card-body { max-height: none !important; overflow: visible !important; }
      .day-card.open .day-card-body { max-height: none; }
      .overview-btn { display: none; }
    }

    /* ===== Countdown ===== */
    #countdown {
      font-size: 1.1rem;
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    #countdown .countdown-num {
      font-size: 1.4rem;
      font-weight: 800;
    }

    /* ===== Weather ===== */
    .day-weather {
      font-size: 0.78rem;
      color: #666;
      margin-top: 2px;
    }
    [data-theme="dark"] .day-weather { color: #aaa; }

    /* ===== Emergency ===== */
    .emergency-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .emergency-card {
      background: #fef7f0;
      border: 1px solid #f0dcc8;
      border-radius: 8px;
      padding: 12px;
    }
    .em-title {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #c44;
    }
    .em-detail {
      font-size: 0.8rem;
      color: #555;
      margin: 2px 0;
    }
    [data-theme="dark"] .emergency-card {
      background: #2a2020;
      border-color: #443030;
    }
    [data-theme="dark"] .em-title { color: #e88; }
    [data-theme="dark"] .em-detail { color: #bbb; }

    /* ===== Day Card Cover Photos ===== */
    .day-card-cover {
      height: 0;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      position: relative;
      transition: height 0.3s;
    }
    .day-card.open .day-card-cover {
      height: 140px;
    }

    /* ===== Day Card Thumbnail ===== */
    .day-card-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      transition: opacity 0.3s;
    }
    .day-card.open .day-card-thumb {
      display: none;
    }
    .day-card-cover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, rgba(255,255,255,0.9));
    }
    [data-theme="dark"] .day-card-cover::after {
      background: linear-gradient(transparent, rgba(30,30,30,0.9));
    }

    /* ===== Theme Toggle ===== */
    .theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #1a1a2e;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: background 0.3s, transform 0.2s;
    }
    .theme-toggle:hover { transform: scale(1.1); }
    [data-theme="dark"] .theme-toggle {
      background: #f0f0ea;
      color: #333;
    }

    /* ===== Dark Mode ===== */
    [data-theme="dark"] body { background: #1a1a1a; color: #e0e0e0; }
    [data-theme="dark"] #app { background: #1a1a1a; box-shadow: 0 -8px 40px rgba(0,0,0,0.5); }
    [data-theme="dark"] #trip-header::after { background: rgba(5,5,12,0.95); }
    [data-theme="dark"] #trip-header::before { background: linear-gradient(to bottom, rgba(5,5,12,0.4) 0%, rgba(8,15,30,0.55) 40%, rgba(5,5,12,0.95) 100%); }
    [data-theme="dark"] #trip-header::before { background: linear-gradient(135deg, rgba(5,5,12,0.85), rgba(8,15,30,0.8)); }
    [data-theme="dark"] .day-card { background: #252525; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    [data-theme="dark"] .day-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.4); }
    [data-theme="dark"] .day-title { color: #eee; }
    [data-theme="dark"] .day-date { color: #999; }
    [data-theme="dark"] .tl-time { color: #aaa; }
    [data-theme="dark"] .tl-name { color: #ddd; }
    [data-theme="dark"] .timeline::before { background: #444; }
    [data-theme="dark"] .timeline-item::before { background: #555; border-color: #252525; box-shadow: 0 0 0 1px #555; }
    [data-theme="dark"] .timeline-item.has-location:hover { background: rgba(255,255,255,0.05); }
    [data-theme="dark"] .summary-section h2 { color: #ccc; border-bottom-color: #444; }
    [data-theme="dark"] .summary-table thead th { background: #2a2a2a; color: #aaa; border-bottom-color: #444; }
    [data-theme="dark"] .summary-table tbody td { border-bottom-color: #333; }
    [data-theme="dark"] .summary-table tbody tr:hover { background: #2a2a2a; }
    [data-theme="dark"] .checklist li { border-bottom-color: #333; }
    [data-theme="dark"] .overview-btn { background: #333; color: #eee; border-color: #555; }
    [data-theme="dark"] #itinerary-panel::-webkit-scrollbar-thumb { background: #555; }
    [data-theme="dark"] .tag-flight { background: #1a2a3a; color: #6db3f2; }
    [data-theme="dark"] .tag-hotel { background: #3a2a1a; color: #f0a060; }
    [data-theme="dark"] .tag-car { background: #1a3a1a; color: #6fd06f; }
    /* ===== Password Gate ===== */
    @keyframes pw-fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #pw-gate {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
    }
    #pw-gate.hidden { display: none; }
    .pw-box {
      position: relative;
      text-align: center;
      max-width: 300px;
      width: 85%;
      animation: pw-fade-in 0.8s ease-out;
    }
    .pw-route {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 36px;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #bbb;
    }
    .pw-route-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }
    .pw-route-line {
      width: 24px;
      height: 1px;
      background: #ddd;
      display: inline-block;
      margin: 0 6px;
    }
    .pw-route-code {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #aaa;
    }
    .pw-box h2 {
      color: #1a1a1a;
      font-size: 1.5rem;
      font-weight: 300;
      margin: 0 0 6px;
      letter-spacing: 0.5px;
    }
    .pw-box p {
      color: #bbb;
      font-size: 0.78rem;
      margin: 0 0 44px;
      letter-spacing: 0.5px;
    }
    .pw-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pw-input-wrap input {
      width: 100%;
      padding: 14px 0;
      border: none;
      border-bottom: 1px solid #e0e0e0;
      border-radius: 0;
      background: transparent;
      color: #1a1a1a;
      font-size: 0.95rem;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }
    .pw-input-wrap input:focus {
      border-bottom-color: #E8913A;
    }
    .pw-input-wrap input::placeholder {
      color: #d0d0d0;
      letter-spacing: 1px;
    }
    .pw-input-wrap button {
      padding: 13px 0;
      border: 1px solid #1a1a1a;
      border-radius: 40px;
      background: transparent;
      color: #1a1a1a;
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 4px;
    }
    .pw-input-wrap button:hover {
      background: #E8913A;
      color: #fff;
      border-color: #E8913A;
    }
    .pw-error {
      color: #A23B34;
      font-size: 0.75rem;
      margin-top: 20px;
      min-height: 1.2em;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="pw-gate">
    <div class="pw-box">
      <div class="pw-route">
        <span class="pw-route-dot" style="background:#E8913A"></span><span class="pw-route-line"></span>
        <span class="pw-route-code">SFO</span>
        <span class="pw-route-line"></span><span class="pw-route-dot" style="background:#2E86AB"></span><span class="pw-route-line"></span>
        <span class="pw-route-code">HNL</span>
        <span class="pw-route-line"></span><span class="pw-route-dot" style="background:#A23B34"></span><span class="pw-route-line"></span>
        <span class="pw-route-code">ITO</span>
        <span class="pw-route-line"></span><span class="pw-route-dot" style="background:#2E86AB"></span>
      </div>
      <h2>San Francisco & Hawaii</h2>
      <p>9 Days · May 2026</p>
      <div class="pw-input-wrap">
        <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
        <button onclick="checkPw()">ENTER</button>
      </div>
      <div class="pw-error" id="pw-error"></div>
    </div>
  </div>

  <header id="trip-header">
    <h1>旧金山 + 夏威夷 9日行程</h1>

  <script>
    // ===== PASSWORD GATE =====
    const PW_HASH = 'bee53cbc48e3ce255f28dbf971dcb4983bbe1982649dd2f7135f5bb8c10bbd2a'; // sha256
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    async function checkPw() {
      const input = document.getElementById('pw-input').value;
      const hash = await sha256(input);
      if (hash === PW_HASH) {
        sessionStorage.setItem('pw-ok', '1');
        document.getElementById('pw-gate').classList.add('hidden');
      } else {
        document.getElementById('pw-error').textContent = '密码错误，请重试';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
    // Auto-unlock if already authenticated this session
    if (sessionStorage.getItem('pw-ok') === '1') {
      document.getElementById('pw-gate').classList.add('hidden');
    }
    // Enter key support
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPw();
    });
  </script>

      },
      flightRoutes: [

    // ===== MAP INITIALIZATION =====
    const map = L.map('map', {
      center: [30, 180],
      zoom: 2,
      zoomControl: true,
      worldCopyJump: false,
      maxBounds: [[-85, -30], [85, 390]],

      noWrap: false

    // ===== CITY MARKERS =====
    const cityCoords = {
      hkg: { lat: 22.3080, lng: 113.9185, name: "香港", color: "#666" },
      sfo: { lat: 37.6213, lng: 237.621, name: "旧金山", color: "#E8913A" },
      hnl: { lat: 21.3187, lng: 202.0775, name: "檀香山", color: "#2E86AB" },
      hilo: { lat: 19.7204, lng: 204.9517, name: "希洛", color: "#A23B34" },
      icn: { lat: 37.5665, lng: 126.9780, name: "首尔", color: "#666" }
    };

    Object.values(cityCoords).forEach(city => {
      const icon = L.divIcon({
        className: 'city-marker',
        html: `<div style="background:${city.color};color:#fff;padding:2px 10px;border-radius:999px;font-size:0.75rem;font-weight:600;white-space:nowrap;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.3)">${city.name}</div>`,
        iconSize: [null, null],
        iconAnchor: [30, 12]
      });
      L.marker([city.lat, city.lng], { icon }).addTo(map);
    });

    // ===== FLIGHT ROUTE POLYLINES =====
    // Convert coordinates to Pacific-centered (lng 0-360 range, Asia ~110-130, Americas ~200-240)
    function toPacificLng(lng) {
      return lng < 0 ? lng + 360 : lng;
    }

    function getCurvedPoints(from, to, numPoints) {
      const points = [];
      const fromLng = toPacificLng(from[1]);
      const toLng = toPacificLng(to[1]);
      const lngDiff = toLng - fromLng;
      const latDiff = to[0] - from[0];
      const dist = Math.sqrt(latDiff * latDiff + lngDiff * lngDiff);
      const offset = dist * 0.12;
      for (let i = 0; i <= numPoints; i++) {
        const t = i / numPoints;
        const lat = from[0] + latDiff * t + Math.sin(Math.PI * t) * offset;
        const lng = fromLng + lngDiff * t;
        points.push([lat, lng]);
      }
      return points;
    }

    const flightLayer = L.layerGroup().addTo(map);
    TRIP_DATA.flightRoutes.forEach(route => {
      const curvedPts = getCurvedPoints(route.from, route.to, 60);
      L.polyline(curvedPts, {
        color: route.color,
        weight: 2.5,
        dashArray: '10, 6',
        opacity: 0.8
      }).addTo(flightLayer);

      // Add numbered label at midpoint of curve
      const mid = curvedPts[Math.floor(curvedPts.length / 2)];
      const numIcon = L.divIcon({
        className: 'route-num-marker',
        html: `<div style="background:${route.color};color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.4);border:2px solid #fff">${route.order}</div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });
      L.marker(mid, { icon: numIcon, interactive: true })
        .bindTooltip(`${route.order}. ${route.label}  ${route.date}`, { direction: 'top', offset: [0, -12] })
        .addTo(flightLayer);
    });

    // ===== ACTIVITY MARKERS + DAY LAYERS =====
    const dayLayers = {};
    // Store per-day numbered activities for timeline rendering
    const dayActivityNumbers = {};

    TRIP_DATA.days.forEach(day => {
      const layerGroup = L.layerGroup();
      dayLayers[day.id] = layerGroup;

      // --- Collect geo-activities with numbering & dedup ---
      const geoActivities = [];
      const actNumMap = new Map(); // activityIndex -> display number
      let num = 0;
      day.activities.forEach((a, idx) => {
        if (!a.lat) return;
        const mapLng = a.lng < 0 ? a.lng + 360 : a.lng;
        // Merge with previous if same location (< 0.002°)
        const prev = geoActivities[geoActivities.length - 1];
        if (prev && Math.abs(prev.lat - a.lat) < 0.002 && Math.abs(prev.mapLng - mapLng) < 0.002) {
          // Same location — share the previous number
          actNumMap.set(idx, prev.num);
          prev.names.push({ name: a.name, time: a.end ? `${a.time}–${a.end}` : a.time });
          return;
        }
        num++;
        actNumMap.set(idx, num);
        geoActivities.push({ lat: a.lat, mapLng, num, names: [{ name: a.name, time: a.end ? `${a.time}–${a.end}` : a.time }] });
      });
      dayActivityNumbers[day.id] = actNumMap;

      // --- Numbered markers ---
      geoActivities.forEach(ga => {
        const icon = L.divIcon({
          className: 'activity-num-marker',
          html: `<div class="activity-num-icon" style="color:${day.color}">${ga.num}</div>`,
          iconSize: [22, 22],
          iconAnchor: [11, 11]
        });
        const marker = L.marker([ga.lat, ga.mapLng], { icon });
        const popupLines = ga.names.map(n => `<b>${n.name}</b><br>${n.time}`).join('<hr style="margin:4px 0">');
        marker.bindPopup(popupLines);
        layerGroup.addLayer(marker);
      });

      // --- Filter route points (remove round-trips) ---
      const rawPts = geoActivities.map(ga => [ga.lat, ga.mapLng]);
      const routePoints = [];
      for (let i = 0; i < rawPts.length; i++) {
        const pt = rawPts[i];
        // A->B->A round-trip filter: skip if current point matches two positions back
        if (routePoints.length >= 2) {
          const backBack = routePoints[routePoints.length - 2];
          if (Math.abs(pt[0] - backBack[0]) < 0.002 && Math.abs(pt[1] - backBack[1]) < 0.002) {
            continue;
          }
        }
        // Deduplicate consecutive same location
        const last = routePoints[routePoints.length - 1];
        if (!last || Math.abs(last[0] - pt[0]) > 0.002 || Math.abs(last[1] - pt[1]) > 0.002) {
          routePoints.push(pt);
        }
      }

      // --- Build large curved segments between stops ---
      function curveSegment(p1, p2, nPts) {
        const pts = [];
        const dlat = p2[0] - p1[0];
        const dlng = p2[1] - p1[1];
        const dist = Math.sqrt(dlat * dlat + dlng * dlng);
        const arcOffset = dist * 0.3;
        for (let j = 0; j <= nPts; j++) {
          const t = j / nPts;
          const lat = p1[0] + dlat * t + Math.sin(Math.PI * t) * arcOffset;
          const lng = p1[1] + dlng * t;
          pts.push([lat, lng]);
        }
        return pts;
      }

      if (routePoints.length >= 2) {
        // Pass 1: white solid outline (bottom layer)
        for (let i = 0; i < routePoints.length - 1; i++) {
          const seg = curveSegment(routePoints[i], routePoints[i + 1], 24);
          layerGroup.addLayer(L.polyline(seg, {
            color: '#fff',
            weight: 10,
            opacity: 0.9,
            lineCap: 'round',
            lineJoin: 'round'
          }));
        }
        // Pass 2: colored dashed arcs (top layer)
        for (let i = 0; i < routePoints.length - 1; i++) {
          const seg = curveSegment(routePoints[i], routePoints[i + 1], 24);
          layerGroup.addLayer(L.polyline(seg, {
            color: day.color,
            weight: 6,
            opacity: 1,
            dashArray: '16, 10',
            lineCap: 'round',
            lineJoin: 'round'
          }));
        }
      }
    });

    // ===== ZOOM-DEPENDENT LAYER VISIBILITY =====
    const ACTIVITY_MIN_ZOOM = 9;
    let activeDayId = null;

    function syncLayerVisibility() {
      const zoom = map.getZoom();
      // Show/hide daily activity layer based on zoom
      if (activeDayId && dayLayers[activeDayId]) {
        const layer = dayLayers[activeDayId];
        if (zoom >= ACTIVITY_MIN_ZOOM && !map.hasLayer(layer)) {
          layer.addTo(map);
        } else if (zoom < ACTIVITY_MIN_ZOOM && map.hasLayer(layer)) {
          map.removeLayer(layer);
        }
      }
      // Hide flight routes when zoomed into city detail, show when zoomed out
      if (zoom >= ACTIVITY_MIN_ZOOM && map.hasLayer(flightLayer)) {
        map.removeLayer(flightLayer);
      } else if (zoom < ACTIVITY_MIN_ZOOM && !map.hasLayer(flightLayer)) {
        flightLayer.addTo(map);
      }
    }

    map.on('zoomend', syncLayerVisibility);

    // ===== SHOW OVERVIEW =====
    function showOverview() {
      activeDayId = null;
      Object.values(dayLayers).forEach(l => map.removeLayer(l));
      if (!map.hasLayer(flightLayer)) flightLayer.addTo(map);
      map.setView(TRIP_DATA.cities.overview.center, TRIP_DATA.cities.overview.zoom);
      document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));

    // ===== ZOOM TO REGION =====
    function zoomToRegion(region, dayId) {
      Object.values(dayLayers).forEach(l => map.removeLayer(l));
      activeDayId = dayId;
      if (dayLayers[dayId]) dayLayers[dayId].addTo(map);
      const city = TRIP_DATA.cities[region];
      if (city) map.setView(city.center, city.zoom, { animate: true });
      document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
      const card = document.getElementById('card-' + dayId);
      if (card) card.classList.add('active');
    }

    // ===== TIMELINE ITEM CLICK DELEGATION =====
    document.addEventListener('click', function(e) {
      const item = e.target.closest('.timeline-item.has-location');
      if (!item) return;
      const lat = parseFloat(item.dataset.lat);
      const lng = parseFloat(item.dataset.lng);
      const mapLng = lng < 0 ? lng + 360 : lng;
      const dayId = item.dataset.day;
      activeDayId = dayId;
      if (dayLayers[dayId] && !map.hasLayer(dayLayers[dayId])) {
        Object.values(dayLayers).forEach(l => map.removeLayer(l));
        dayLayers[dayId].addTo(map);
      }
      map.setView([lat, mapLng], 14, { animate: true });
      dayLayers[dayId].eachLayer(marker => {
        const mll = marker.getLatLng && marker.getLatLng();
        if (mll && Math.abs(mll.lat - lat) < 0.001 && Math.abs(mll.lng - mapLng) < 0.001) {
          marker.openPopup();
        }
      });
    });

    // ===== RENDER DAY CARDS =====
    function renderDayCards() {
      const container = document.getElementById('day-cards');

        // Build timeline
        const actNums = dayActivityNumbers[day.id] || new Map();
        let timelineItems = day.activities.map((act, idx) => {
          const hasLoc = act.lat !== undefined && act.lng !== undefined;
          const timeStr = act.end ? `${act.time}–${act.end}` : act.time;
          const locAttrs = hasLoc
            ? ` data-lat="${act.lat}" data-lng="${act.lng}" data-day="${day.id}"`
            : '';
          const locClass = hasLoc ? ' has-location' : '';

          const dotStyle = hasLoc ? ` style="--dot-color: ${day.color}"` : '';
          const numBadge = actNums.has(idx)
            ? `<span class="tl-num" style="background:${day.color}">${actNums.get(idx)}</span>`
            : '';
          const subsHtml = act.subs
            ? `<ul class="tl-subs">${act.subs.map(s => `<li>${s.name}<span class="tl-sub-dur">${s.duration}</span></li>`).join('')}</ul>`
            : '';
          return `<div class="timeline-item${locClass}"${locAttrs}${dotStyle}>
            <span class="tl-time">${numBadge}${timeStr}</span>

        `;
      });

      container.innerHTML = html;
    }

    // ===== TOGGLE CARD =====
    function toggleCard(dayId) {
      const card = document.getElementById('card-' + dayId);
      const wasOpen = card.classList.contains('open');

      // Close all cards first
      document.querySelectorAll('.day-card.open').forEach(c => {
        c.classList.remove('open');
      });

      // If it wasn't open, open it and zoom to region
      if (!wasOpen) {
        card.classList.add('open');
        const region = card.dataset.region;
        zoomToRegion(region, dayId);
        if (window.innerWidth <= 768) {
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
        }
      } else {
        // Card was open, now closing — show overview
        showOverview();
      }
    }

    // ===== COUNTDOWN =====
    function updateCountdown() {
      const tripDate = new Date('2026-05-01T00:00:00');
      const now = new Date();
      const diff = tripDate - now;
      const el = document.getElementById('countdown');
      if (diff > 0) {
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
        el.innerHTML = `距离出发还有 <span class="countdown-num">${days}</span> 天`;
      } else if (diff > -9 * 24 * 60 * 60 * 1000) {
        el.textContent = '🎉 旅途进行中！';
      } else {
        el.textContent = '✅ 旅途已结束';
      }
    }

    // ===== THEME TOGGLE =====
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', next);
    }

    // ===== TRIP PROGRESS BAR =====
    function renderProgress(activeDayNum) {
      const container = document.getElementById('trip-progress');
      const tripStart = new Date('2026-05-01');
      const now = new Date();
      const todayDayNum = Math.floor((now - tripStart) / (1000*60*60*24)) + 1;

      let html = '';
      TRIP_DATA.days.forEach((day, idx) => {
        const isPast = todayDayNum > day.day;
        const isToday = todayDayNum === day.day;
        const isActive = activeDayNum === day.day;
        let cls = 'prog-day';
        if (isPast) cls += ' past';
        if (isActive || isToday) cls += ' active';

        html += `<div class="${cls}" onclick="toggleCard('${day.id}')">
          <div class="prog-dot" style="${isActive ? 'border-color:' + day.color + ';background:' + day.color : ''}"></div>
          <span class="prog-label">D${day.day}</span>
        </div>`;
        if (idx < TRIP_DATA.days.length - 1) {
          html += `<div class="prog-line${isPast ? ' past' : ''}"></div>`;
        }
      });
      container.innerHTML = html;
    }

    // Patch toggleCard to update progress bar
    const _origToggleCard = toggleCard;
    toggleCard = function(dayId) {
      _origToggleCard(dayId);
      const day = TRIP_DATA.days.find(d => d.id === dayId);
      const card = document.getElementById('card-' + dayId);
      if (day && card && card.classList.contains('open')) {
        renderProgress(day.day);
      } else {
        renderProgress(null);
      }
    };

    // Patch showOverview to reset progress
    const _origShowOverview = showOverview;
    showOverview = function() {
      _origShowOverview();
      renderProgress(null);
    };

    // ===== INIT =====
    renderSummary();
    renderDayCards();
    updateCountdown();
    renderProgress(null);

    // Auto-detect theme preference on load
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
    })();

    toggleCard('d1');
  </script>
</body>
</html>
